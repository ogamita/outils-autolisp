stages:
  - test

default:
  image: alpine:3.21
  before_script:
    - apk add --no-cache bash make perl diffutils grep sed findutils coreutils

autolisp_script_tests:
  stage: test
  script:
    - make test-ci TEST_BACKEND=fake TEST_TIMEOUT=10
  rules:
    - changes:
        - .gitlab-ci.yml
        - Makefile
        - autolisp-script/**/*
    - when: manual
